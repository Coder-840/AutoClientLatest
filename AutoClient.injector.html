<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoClient Injector</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
    }
    #status {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div id="status">Loading AutoClient with runtime keybind fixes…</div>

  <script>
    (async () => {
      const status = document.getElementById("status");
      const sourceFile = "./AutoClient.html";

      const patchScript = `
<script>
(function() {
  'use strict';

  const injectedEvents = new WeakSet();

  function isEditable(el) {
    if (!el || el === document.body || el === document.documentElement) return false;
    if (el.isContentEditable) return true;
    const tag = (el.tagName || '').toUpperCase();
    return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
  }

  function shouldSuppressRightShift(ev) {
    if (ev.code !== 'ShiftRight') return false;
    const target = ev.target instanceof Element ? ev.target : null;
    return isEditable(target) || isEditable(document.activeElement);
  }

  document.addEventListener('keydown', function(ev) {
    if (injectedEvents.has(ev)) return;

    if (shouldSuppressRightShift(ev)) {
      ev.preventDefault();
      ev.stopImmediatePropagation();
      return;
    }

    const target = ev.target instanceof Element ? ev.target : null;
    if (isEditable(target) || isEditable(document.activeElement)) return;

    if (typeof ev.key !== 'string' || ev.key.length !== 1) return;
    if (ev.ctrlKey || ev.altKey || ev.metaKey) return;

    const lower = ev.key;
    const upper = lower.toUpperCase();
    if (lower === upper) return;

    const mirrored = new KeyboardEvent('keydown', {
      key: upper,
      code: ev.code,
      location: ev.location,
      repeat: ev.repeat,
      ctrlKey: ev.ctrlKey,
      shiftKey: ev.shiftKey,
      altKey: ev.altKey,
      metaKey: ev.metaKey,
      bubbles: true,
      cancelable: true,
      composed: true
    });

    injectedEvents.add(mirrored);
    (target || document).dispatchEvent(mirrored);
  }, true);
})();
<\/script>`;

      try {
        const html = await fetch(sourceFile, { cache: "no-store" }).then((r) => {
          if (!r.ok) throw new Error(`Failed to fetch ${sourceFile}: ${r.status}`);
          return r.text();
        });

        const patched = html.replace(/<\/head>/i, `${patchScript}\n</head>`);
        if (patched === html) {
          throw new Error("Unable to inject patch script: </head> not found.");
        }

        document.open();
        document.write(patched);
        document.close();
      } catch (err) {
        console.error(err);
        status.textContent = `Injector failed: ${err.message}`;
      }
    })();
  </script>
</body>
</html>
